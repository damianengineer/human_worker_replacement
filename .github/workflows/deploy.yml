name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; let an in-flight run finish rather than
# canceling it, so a page never gets left half-deployed.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      # 1. Initialize Pages setup FIRST to obtain environment configuration variables
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      # 2. Build the Eleventy site using the dynamic base path prefix
      - name: Build with Eleventy
        run: npx eleventy --pathprefix="${{ steps.pages.outputs.base_path }}"

      # 3. Securely pack and bundle your production files
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./_site"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
