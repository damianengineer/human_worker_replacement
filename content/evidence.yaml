# Data for "The Evidence" page (CLAUDE.md IA: "The Evidence — data/trends
# on AI and entry-level jobs"). Same pattern as history.yaml/glossary.yaml:
# a non-technical editor edits this file to change what the page says,
# without touching any template.
#
# STATUS: All four sections (current_state, at_risk, protective_factors,
# counterarguments) now have real, drafted content — no PLACEHOLDER text
# remains on this page. That's a first draft, not a publish-ready one:
# see the AI Disclosure log for open items (unverified citations, two
# possible source-mixup flags, one possible undisclosed COI, and an
# inferred-not-confirmed citation attachment in counterarguments).
#
# Every item needs a citation id from content/citations.yaml once real
# content replaces its placeholder (CLAUDE.md Section 6 — no uncited
# claims). Leave a citation field null only while the claim itself is
# still a placeholder; the page will visibly flag "citation needed" until
# then.

current_state:
  title: "Current State of Displacement"
  intro: >-
    The clearest signal in the data isn't that AI is emptying the job
    market — it's that it's closing the door colleges have always sent
    students through. Independent research from Stanford economists,
    competing AI labs, and decades of peer-reviewed economics all points
    the same way: entry-level hiring in AI-exposed fields is slowing, even
    as overall employment stays largely stable. For today's college
    students, that means the old path — get a degree, take an entry-level
    job, learn on the job — is exactly where the disruption is
    concentrated right now.
  items:
    # current_state items use a richer citation shape than the other
    # sections, since most of these claims are backed by two independent
    # sources rather than one:
    #   claim: plain-language statement of a current trend or data point
    #   primary_citation: citation ID from content/citations.yaml
    #   corroborating_citation: a second, independent citation ID, or null
    #     if the primary source doesn't need/have one
    #   note: explains what the corroboration shows (e.g. a different
    #     dataset reaching the same conclusion), or why no second source
    #     is needed for this one
    - claim: >-
        Young workers (ages 22–25) in AI-exposed jobs have seen employment
        fall by about 13–16% since ChatGPT was released. This is the
        clearest sign that entry-level jobs — not more senior roles — are
        absorbing the disruption first.
      primary_citation: "brynjolfsson2025"
      corroborating_citation: "massenkoff2026"
      note: >-
        Confirmed independently using a completely different dataset — CPS
        survey data, instead of the ADP payroll data used in the primary
        source.
      stat_callout:
        numeral: "13–16%"
        label: "Drop in young-worker employment in AI-exposed jobs since ChatGPT launched"
        citations: ["brynjolfsson2025", "massenkoff2026"]

    - claim: >-
        Hiring of young workers into AI-exposed jobs has slowed by roughly
        14%. That drop comes mostly from employers hiring fewer new
        people, not from laying off current employees — meaning the
        disruption is showing up at the front door, not by pushing people
        out the back.
      primary_citation: "massenkoff2026"
      corroborating_citation: "brynjolfsson2025"
      note: >-
        Reached the same conclusion — that slower hiring, not firing,
        drives the effect — using a completely separate data source: ADP
        payroll records.

    - claim: >-
        Robots already had a measurable effect on jobs before generative
        AI even existed: for every additional robot per 1,000 U.S.
        workers, wages fell by about 0.42% and employment fell by about
        0.2 percentage points.
      primary_citation: "acemoglu2020"
      corroborating_citation: null
      note: >-
        No second source needed — this peer-reviewed, non-corporate study
        is independent on its own, and serves as the credibility anchor
        for the claims in this section.

    - claim: >-
        AI usage still lags far behind what AI can theoretically do — by
        58 to 68 percentage points, even in the jobs considered most at
        risk. In other words, AI's capability is running ahead of how much
        it's actually being used, so the disruption is real but hasn't
        fully played out yet.
      primary_citation: "richmond2026"
      corroborating_citation: "massenkoff2026"
      note: >-
        Two competing AI labs — OpenAI and Anthropic — independently found
        similar gaps using their own separate usage data. Anthropic's
        research found its Claude model covers only 33–75% of its
        theoretical task capacity across occupations.
      stat_callout:
        numeral: "58–68 pts"
        label: "Gap between AI's theoretical capability and how much it's actually used"
        citations: ["richmond2026", "massenkoff2026"]

    - claim: >-
        Only about 18% of jobs fall into the "high near-term automation
        risk" category, and 46% show little immediate change. That's an
        important counterweight to the more alarming statistics: most jobs
        aren't about to disappear.
      primary_citation: "richmond2026"
      corroborating_citation: "shrm2026"
      note: >-
        An independent employer survey — not from an AI company — found
        something similar: most employers report no near-term plans to
        automate away roles.
      stat_callout:
        numeral: "18%"
        label: "Jobs in the \"high near-term automation risk\" category"
        citations: ["richmond2026", "shrm2026"]

at_risk:
  title: "Industries & Jobs Most at Risk"
  # This section is split into two subsections, each with its own h3
  # heading: theoretical_vs_observed (the two charts + what they show) and
  # most_exposed (the industry-by-industry breakdown, still placeholder).
  theoretical_vs_observed:
    heading: "Theoretical versus Observed"
    intro: >-
      AI could theoretically handle the most tasks in office and
      knowledge-work jobs — fields like computer and math work, business
      and finance, management, engineering, and law. Two different AI
      companies measured this on their own, using separate platforms, and
      got a similar result. But in both charts, how much AI is actually
      being used still falls far short of that potential across the board
      — meaning most of what AI could do hasn't actually happened yet.
      Right now, real use is concentrated in computer/math and
      business/finance jobs on both platforms, which is the strongest
      sign of where disruption is happening right now. Law is an
      interesting exception: one company's data shows it as the single
      most AI-used field, while the other's data shows barely any real
      use there, even though both rate its theoretical risk equally high.
      That's a reminder that even trustworthy sources using similar
      methods can disagree sharply about one specific field.
    methodology_note: >-
      Both companies base their measure of AI's theoretical reach on the
      same underlying research, and both back up their methods with
      well-established, peer-reviewed economics research:
    methodology_citations:
      - "eloundou2023"
      - "acemoglu2020"
      - "acemoglu2022"
      - "autordornhanson2013"
      - "borusyakhulljaravel2022"
      - "graetzmichaels2018"
    figures:
      # Rendered as a two-column, side-by-side grid. Each figure:
      #   id: a page-unique id (used for the zoom/lightbox anchor — must
      #     be unique across the WHOLE page, not just this figure list,
      #     since two different charts can cite the same source)
      #   image: path under /assets/img/
      #   alt: meaningful alt text describing the chart for screen readers
      #     (CLAUDE.md Section 9 — images require real alt text, not
      #     filler)
      #   title: the chart's own title, shown as a caption heading
      #   citation: citation ID from content/citations.yaml — the caption
      #     pulls authors/date/publisher/url directly from that entry, so
      #     credit and the source link can't drift out of sync with it
      - id: "tvo-massenkoff"
        image: "/assets/img/theoretical-capability-vs-observed-exposure.webp"
        alt: >-
          Bar chart comparing each occupational category's theoretical AI
          capability to how much AI exposure has actually been observed
          in the workforce.
        title: "Theoretical capability and observed exposure by occupational category"
        citation: "massenkoff2026"
      - id: "tvo-eloundou"
        image: "/assets/img/capability-overhang-by-occupation.png"
        alt: >-
          Bar chart showing the "capability overhang" — the gap between
          AI's theoretical capability and its real-world use — across
          different occupations.
        title: "The capability overhang by occupation"
        citation: "eloundou2023"
  most_exposed:
    heading: "Most Exposed Occupations"
    # A list of paragraphs (not one string) so the page renders an actual
    # paragraph break between them, matching how the source text reads.
    intro:
      - >-
        Two different AI companies — Anthropic (which makes Claude) and
        OpenAI (which makes ChatGPT) — each looked at which jobs people
        use AI for the most. They used their own separate data, but they
        found a lot of the same things.
      - >-
        Office jobs that involve typing, writing, or working with
        computers show up as the most exposed. Both companies agree on
        this. The jobs at the top of both lists include:
    figures:
      # Same shape as theoretical_vs_observed.figures — Anthropic chart on
      # the left, OpenAI chart on the right.
      - id: "exposed-massenkoff"
        image: "/assets/img/most-exposed-occupations.webp"
        alt: >-
          Bar chart ranking occupations by how exposed they are to AI use,
          according to Anthropic's data.
        title: "Most exposed occupations"
        citation: "massenkoff2026"
      - id: "exposed-eloundou"
        image: "/assets/img/high-exposure-occupations-scale-effects.png"
        alt: >-
          Chart splitting high-exposure occupations by whether AI's
          cost-saving "scale effects" offset direct labor savings,
          according to OpenAI's data.
        title: "High exposure occupations split by whether scale effects offset direct labor savings"
        citation: "eloundou2023"
    items:
      # These items use the same primary/corroborating/note shape as
      # current_state's items (see that section's comment) since each of
      # these jobs shows up on both companies' lists, not just one.
      # Alphabetized by industry (rendered as a two-column list on wide
      # screens — see .evidence-list--two-col in the-evidence.css).
      - industry: "Bookkeeping Clerks"
        risk_summary: "People who track a business's money and records."
        primary_citation: "massenkoff2026"
        corroborating_citation: "eloundou2023"
        note: null
      - industry: "Computer Programmers and Software Developers"
        risk_summary: "People who write and fix computer code."
        primary_citation: "massenkoff2026"
        corroborating_citation: "eloundou2023"
        note: "This is the single most AI-used job on both companies' lists."
      - industry: "Customer Service Representatives"
        risk_summary: "People who answer customer questions and handle complaints."
        primary_citation: "massenkoff2026"
        corroborating_citation: "eloundou2023"
        note: "Both companies found this job near the top of their lists."
      - industry: "Data Entry Keyers"
        risk_summary: "People who type information from paper documents into computer systems."
        primary_citation: "massenkoff2026"
        corroborating_citation: "eloundou2023"
        note: "This job shows up as highly exposed on both companies' lists too."
      - industry: "Financial Analysts"
