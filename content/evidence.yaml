protective_factors:
  title: "Why Some Jobs Are Safer From AI — For Now"
  # This section's shape is custom (barriers + a closing outlook), not the
  # generic factor/explanation/citation list used elsewhere, since the
  # human's content has a distinct heading + explanation + "jobs
  # protected" line + citation(s) per barrier, plus an outlook block that
  # isn't itself a barrier.
  lead_figure:
    id: "protective-human-necessity"
    image: "/assets/img/human-necessity-workers-remain-vital.png"
    alt: >-
      Chart showing which occupational categories rate highest on "human
      necessity" — where workers remain vital because people specifically
      want a human, not just a capable AI.
    title: "Human necessity helps us understand where workers remain vital"
    citation: "eloundou2023"
  barriers:
    - heading: "Barrier 1: AI still struggles to understand the physical world"
      explanation: >-
        Even the smartest AI models are surprisingly bad at simple
        physical estimates — like guessing how fast a pool ball is
        rolling, or how big something is in a video. Researchers at
        Stanford built a test called QuantiPhy to check this, and found
        that AI mostly guesses based on patterns it memorized, rather
        than actually reasoning about real-world physics. A robot needs
        to know things like: how hard to squeeze an egg without breaking
        it, or when it's safe to grab a spinning mixer blade. Right now,
        AI just isn't reliable at that kind of judgment.
      protected_jobs: >-
        hands-on healthcare work (nursing, physical therapy), skilled
        trades, food service, warehouse work, and anything involving
        delicate or unpredictable physical movement.
      citations: ["myers2026"]

    - heading: "Barrier 2: Rules and licenses require a real, accountable human"
      explanation: >-
        Some jobs are protected not because AI can't do the thinking
        part, but because the law says a licensed person has to sign off.
        OpenAI's own research points to court reporters as an example —
        AI could handle a lot of the transcription work, but in most
        places, a certified human still has to legally verify the
        transcript. The same logic protects lawyers, whose jobs sit in
        what OpenAI calls the "regulatory and accountability" category —
        only about 9% of all jobs fall into this well-protected group,
        but it includes some of the most stable professions.
      protected_jobs: >-
        lawyers, judges, licensed medical professionals, auditors, court
        reporters — anywhere a human has to be legally responsible for
        the outcome.
      stat_callout:
        numeral: "9%"
        label: "Jobs protected by legal or licensing accountability requirements"
        citations: ["richmond2026"]
      citations: ["richmond2026"]

    - heading: "Barrier 3: People often want another person, not a machine"
      explanation: >-
        About 30.5% of jobs, according to OpenAI's data, depend on this
        barrier — jobs where the whole point is a human connection.
        Elementary school teachers and registered nurses are OpenAI's own
        examples: AI can help write a lesson plan or organize patient
        notes, but people still want an actual teacher caring for their
        kid, or an actual nurse in the room during a hard moment. This
        barrier isn't really about what AI can do — it's about what
        people want, which is much slower to change.
      protected_jobs: "teaching, nursing, counseling, social work, childcare."
      stat_callout:
        numeral: "30.5%"
        label: "Jobs protected because people specifically want a human, not just AI"
        citations: ["richmond2026"]
      citations: ["richmond2026"]

    - heading: "Barrier 4: AI still can't reliably do long, multi-step thinking on its own"
      explanation: >-
        In March 2026, a team of researchers got real, notable attention
        for building an "AI Scientist" that could come up with a research
        idea, run the experiment, and write it up — and it even got a
        paper published. That sounds like scientists are replaceable. But
        look closer: this took the AI field 1.5 years of hard work just
        to automate one research paper's worth of steps reliably, and it
        needed a lot of human-designed structure to keep the AI on track
        over a long project. Real scientific and engineering work often
        involves weeks or months of connected reasoning, not one
        self-contained task — and that "staying on track over a long
        time" problem is still one of AI's biggest weaknesses.
      protected_jobs: >-
        scientists, engineers, and other roles built around long,
        connected chains of judgment rather than one-off tasks.
      citations: ["lu2026"]
  outlook:
    # Rendered right after this barrier (1-based, matching the "Barrier N"
    # labels) rather than after the whole list, since this outlook is
    # specifically about Barrier 1's physical-world gap closing over time.
    after_barrier: 1
    heading: "Looking ahead: this barrier is shrinking, not permanent"
    text: >-
      It's worth being honest that Barrier 1 — the physical-world barrier
      — is exactly what companies like NVIDIA are racing to fix. NVIDIA
      has built a new physics engine called Newton (made with Google
      DeepMind and Disney) specifically to help robots learn real-world
      physics in simulation before trying it for real. NVIDIA has also
      released robot "brains" called GR00T, plus a system called Cosmos
      that generates realistic physics-based video to train robots — and
      by 2026, real companies like Boston Dynamics were already building
      on top of this technology. None of this means physical jobs are
      unsafe today. It does mean the barrier protecting them is a current
      technology gap, not a permanent wall — a good reason to build career
      plans that are flexible rather than assuming any one job is safe
      forever.
    citations: ["huang2025", "nvidianewsroom2026"]

counterarguments:
  title: "Will AI Really Take Over Most Jobs? Here's the Other Side of the Story"
  intro: >-
    Not everyone agrees that AI is guaranteed to replace huge numbers of
    workers. Some smart, well-respected researchers say we should slow
    down before assuming the worst. Here are the three strongest reasons
    to be skeptical.
  # Custom shape (not the generic counterargument/explanation/citation
  # list) since this content has multi-paragraph points, one with its own
  # sub-list and closing line, plus a callout and a trailing outro that
  # isn't itself a numbered point.
  points:
    - heading: "1. Experts Have Been Wrong Before — Radiologists Are the Perfect Example"
      paragraphs:
        - >-
          In 2016, a famous AI scientist named Geoffrey Hinton stood on
          stage and said something bold: doctors should stop training new
          radiologists (the doctors who read X-rays and scans) because AI
          would replace them within five years, maybe ten at most. He
          compared radiologists to a cartoon coyote who's already run off
          a cliff but hasn't looked down yet.
        - "He was wrong."
        - >-
          Almost ten years later, hospitals need more radiologists than
          ever. The Mayo Clinic's radiology team grew by 55%. Experts now
          predict the field will keep growing for the next 30 years.
          There's actually a shortage of radiologists in some places.
          Even Hinton admitted he made a mistake — he said AI is helping
          radiologists work faster and more accurately, not replacing
          them.
      pull_quote: "He was wrong."
      callout: >-
        Why this matters: if one of the smartest AI researchers in the
        world got this wrong, it's a good reminder that predicting
        exactly which jobs will disappear — and when — is really hard to
        do.
      citations: ["byju2024", "stempniak2026"]

    - heading: "2. New Jobs Tend to Show Up When Old Ones Change"
      paragraphs:
        - >-
          Here's something people often forget: new kinds of jobs get
          created when technology changes, not just old ones destroyed.
          Researchers who studied nearly 80 years of job data
          (1940–2018) found that brand-new job types have been a real and
          steady source of job growth throughout that whole time —
          especially when new technology helps people do their jobs
          better, instead of replacing them completely.
        - >-
          There's a tricky catch, though: today's AI research can only
          study jobs that already exist. It can't yet measure jobs that
          don't exist yet but might get created because of AI. That means
          today's scary statistics might be missing half the picture.
      citations: ["autorchin2024"]

    - heading: "3. Even Serious Economists Say the Data Isn't Clear Yet"
      paragraphs:
        - >-
          In March 2026, a respected economist named Jed Kolko published
          a detailed review of AI-and-jobs research for the Brookings
          Institution — a well-known, independent research group. His
          conclusion: it's simply too early to know for sure what AI is
          doing to the job market. A few of his key points:
      sub_points:
        - >-
          Different studies disagree with each other. One major study
          found that young workers in AI-exposed jobs were losing out.
          Another study, using different data, found unemployment
          actually rose less in those same kinds of jobs. When two
          careful studies come to different answers, that's a sign we
          don't have the full picture yet.
        - >-
          The timing doesn't always add up. Some researchers found that
          hiring in "AI-exposed" jobs started dropping in 2022 — before
          ChatGPT was even released to the public. That suggests other
          things (like rising interest rates) might explain some of
          what's happening, not just AI.
        - >-
          Companies have a reason to blame AI for layoffs. If a company
          overhired during the pandemic and now needs to cut jobs, it
          looks a lot better to say "we're becoming more efficient with
          AI" than to say "we made a hiring mistake." That means we
          should read layoff announcements a little skeptically.
        - >-
          The people studying AI's effect on jobs are often the same
          people whose own jobs are most affected by AI — like writers,
          researchers, and office workers. That could subtly shape how
          they interpret what they're seeing.
      closing: >-
        Kolko's big-picture finding: so far, the pace of job-market
        change since ChatGPT came out looks pretty similar to past tech
        shifts, like the rise of computers in the 1980s or the internet
        in the 1990s. It hasn't sped up in any unusual way — at least not
        yet.
      pull_quote: "It hasn't sped up in any unusual way — at least not yet."
      citations: ["kolko2026", "eckhardtgoldschlag2025"]
  outro:
    heading: "The Honest Middle Ground"
    text: >-
      None of this means AI definitely won't disrupt jobs — some
      disruption is already real, and even researchers who question the
      scarier predictions agree that individual workers can still be hurt
      during a transition period, even if things work out fine in the
      long run for the economy overall. The point isn't "don't worry."
      The point is: be skeptical of confident predictions in either
      direction, because history shows those predictions are often wrong
      — and the honest answer right now is that nobody knows for certain
      how this will play out.
