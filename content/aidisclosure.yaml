# Running work log for the AI Disclosure page (CLAUDE.md Section 7).
#
# Add a NEW entry each time the AI assistant substantially drafts or edits
# site content — don't rewrite old entries. This is the running record the
# disclosure page is built from.
#
# KEEP ENTRIES SHORT AND GENERAL. Each ai_did/human_did line is a
# high-level summary sentence — "Drafted the History page's four cases and
# added their citations" — not a per-file or per-citation transcript.
# Verbose entries cost real tokens to read/write on every future edit; the
# log only needs to convey who-did-what-in-general, not a diff.
#
# COMPACT PERIODICALLY. Once the log passes roughly 100 entries, fold the
# older ones into a single summarized entry (e.g. "Entries from 2026-07
# through 2026-09: scaffolded the Evidence, History, and Take Action pages
# and their citations") and keep only the most recent entries in full.
# Don't let this file grow unbounded. (This log was condensed from ~20
# detailed entries down to the entries below on 2026-07-22, at the human's
# request, ahead of the usual ~100-entry threshold.)
#
# Each entry:
#   date: "YYYY-MM-DD"
#   summary: a short, unique label for what this entry covers (e.g. "The
#     Evidence page (all four sections)") — rendered as the entry's real
#     heading, together with the date. Required so each entry has a
#     distinguishable heading rather than every entry repeating identical
#     "AI did"/"Human did" heading text (WCAG 2.1 AA SC 2.4.6 — see
#     CLAUDE.md Section 9).
#   ai_did: [short, high-level summary lines — not verbose]
#   human_did: [short, high-level summary lines — not verbose]
#   notes: optional — caveats, especially verification status. Be honest
#     here rather than asserting review happened if it hasn't yet. Keep
#     this concise too.

entries:
  - date: "2026-07-21"
    summary: "Project setup, Glossary, and citation groundwork"
    ai_did:
      - "Scaffolded the Eleventy project (build config, layouts, CSS) and drafted the Glossary page's term definitions from supplied source material."
      - "Built out content/citations.yaml, flagging missing or uncertain bibliographic details instead of inventing them."
      - "Drafted this AI Disclosure page and its work-log format."
    human_did:
      - "Directed the project's scope and build order, and supplied the glossary term list and reference material."
      - "Reviewed and approved each step."
    notes: "Early-stage citation verification was incomplete at this point — later entries resolved most of it."

  - date: "2026-07-21"
    summary: "History page's four cases"
    ai_did:
      - "Drafted the History page's four cases (Luddite Rebellion, telephone operator automation, office computerization, Amazon warehouse robotics) from supplied material, with citations for each."
      - "Corrected one case's historical detail (Luddite Rebellion) after the human flagged it, and added forward links from History to The Evidence and Take Action in a later pass."
    human_did:
      - "Supplied all four cases' content and sources, caught the historical inaccuracy and supplied the fix, and reviewed each step."
    notes: "A couple of this page's citations started out flagged as unverified; see citations.yaml for current status."

  - date: "2026-07-21"
    summary: "The Evidence page (all four sections)"
    ai_did:
      - "Built The Evidence page's four sections (current state of displacement, at-risk industries with a Stark State program map, protective factors, counterarguments) from supplied content and data, with roughly 20 supporting citations."
      - "Flagged a couple of possible source mix-ups and one possible undisclosed conflict of interest in the citations rather than resolving them unilaterally, and built the click-to-enlarge chart lightbox."
      - "In a later pass: moved the 'barrier is shrinking, not permanent' outlook to sit directly under Barrier 1, added a new lead figure ('Human necessity helps us understand where workers remain vital,' from the same OpenAI report already cited on this page), and alphabetized the Most Exposed Occupations list into a two-column layout."
    human_did:
      - "Supplied all section content, chart images, and the Stark State program classification across multiple passes; asked for a couple of reading-level rewrites; reviewed each step."
    notes: >-
      Some citations on this page remain flagged unverified or incomplete —
      see each entry's `status`/`todo` field in citations.yaml.

  - date: "2026-07-21"
    summary: "Take Action page (three CTAs)"
    ai_did:
      - "Built the Take Action page's three calls to action (Plan B, AI literacy, informed citizenship on policy) from supplied content, with roughly 25 resource/citation entries."
      - "Left a few citations (the Sanders and McGarvey bills, the SSA Trustees Report) without a specific URL rather than guessing one, reorganized the AI-literacy resources by type with video/site previews, and added a visually-flagged AI Privacy & Security subsection."
      - "Corrected a factual detail: prohibited AI practices are EU AI Act Article 5, not Article 9 as originally stated, confirmed via web search."
    human_did:
      - "Supplied all CTA content and resource lists across multiple passes, specified their organization, and reviewed each step."
    notes: "Several resource citations on this page are still marked unverified in citations.yaml."

  - date: "2026-07-22"
    summary: "Landing page, dark theme, and site documentation"
    ai_did:
      - "Built the site's landing page (content-assembly only, per the explicitly scoped request for that pass — no new reference verification)."
      - "Restyled the whole site with a dark-mode-first color palette that follows the visitor's OS preference, computing real WCAG contrast ratios rather than eyeballing them, and fixed a lightbox close button that would otherwise have gone invisible in dark mode."
      - "Widened intro-paragraph line length across all pages so they no longer wrap far short of the rest of the page's content."
      - "Created the About page, and updated CLAUDE.md/AGENTS.md and README.md to reflect the site's current structure and how to build/run it locally."
      - "Condensed this log from about 20 detailed entries into the general-terms entries above."
    human_did:
      - "Supplied the landing page copy, approved the dark-theme palette and OS-preference default, and directed this batch of structural/documentation updates."
      - "Confirmed that Claude Code and Claude Desktop (both Anthropic) are the two AI tools used on this project."
    notes: >-
      This entry itself is the first written under the new, more general
      log format — see the file header above for the compaction this
      followed.

  - date: "2026-07-22"
    summary: "Multimedia enhancements and IA-audit implementation"
    ai_did:
      - "Reused an existing Evidence chart on the landing page, added a stat-callout component to 5 already-cited stats and a pull-quote component to 2 already-existing sentences, and embedded 2 already-cited YouTube videos (privacy-enhanced, no autoplay, lazy-loaded)."
      - "Extended the site's emoji-marker convention to Take Action's three CTAs and History's four cases, from a set the human approved first."
      - "Ran a Phase 1 IA/navigation audit (IA_AUDIT.md) and, on approval, implemented several of its findings: cross-links from The Evidence to Take Action/History, a Stark State entry in Evidence's own jump-nav, and a top-of-page teaser link to it."
      - "Added a `summary` field to this log's entries (see file header) so each has a unique heading, instead of every entry repeating identical \"AI did\"/\"Human did\" headings — a WCAG 2.4.6 fix from that same audit."
    human_did:
      - "Approved the icon set, confirmed the audit's approved item list and sequencing, and reviewed each step."
    notes: >-
      IA-audit implementation is still in progress as of this entry
      (References A–Z index, Take Action sub-nav, Glossary back-links,
      and the Stark State accordion are still pending) — this entry will
      likely be superseded or added to once that work completes.

  - date: "2026-07-22"
    summary: "IA audit implementation completed"
    ai_did:
      - "Finished implementing all 8 approved IA-audit items, each as its own verified, committed change: Evidence cross-links, a Stark State jump-nav entry and top-of-page teaser, disambiguated AI Disclosure headings, a References A–Z index, an AI Literacy sub-nav, 6 Glossary back-links (5 terms intentionally left unlinked — no single clean destination), and native `<details>`/`<summary>` accordions for the Stark State tiers."
      - "Produced a verification report confirming every new anchor resolves site-wide, nav/skip-link are unaffected, no JS or tables were introduced, and removed IA_AUDIT.md once its findings were implemented."
    human_did:
      - "Reviewed the verification report and confirmed IA_AUDIT.md could be removed."
    notes: >-
      Reordering The Evidence's sections (audit item 8b) was declined —
      it would invert the evidence-first argument this site is built
      around. Two mobile-specific questions from the audit (the chart
      lightbox's close-button position on short viewports, and whether
      the two-column lists feel cramped around 640–768px) were left as
      open questions rather than guessed at — they need an actual device
      check this pass didn't do.

  - date: "2026-07-22"
    summary: "Two licensed historical images added to History"
    ai_did:
      - "Web-researched licensing for a candidate image per History case; confirmed two as usable (an 1812 public-domain engraving for the Luddite Rebellion, a CC BY 4.0 Wikimedia Commons photo for Amazon Warehouse Robotics) and two as not confirmable (1920s telephone operators — source blocked automated verification; 1980s office computerization — no free/licensed candidate found)."
      - "Added both images with real citations, after viewing each image directly to write accurate alt text rather than guessing from the filename."
      - "Found and fixed a bug while verifying this: the shared figure/lightbox partial (introduced earlier this session) was silently rendering every chart's citation credit as blank, site-wide, due to a Nunjucks import-context issue — not specific to this task's new images."
    human_did:
      - "Approved proceeding with the two confirmed-license candidates."
    notes: >-
      No image was added for the two cases without a confirmed license,
      per the task's explicit "ambiguous license is a do-not-include"
      rule — not filled in with a lower-confidence substitute.

  - date: "2026-07-23"
    summary: "Citation policy change — markers now link to References"
    ai_did:
      - "Changed every source marker site-wide to link to that source's own entry on the References page instead of straight out to the external site, in response to reader feedback that inline citations felt overwhelming. The References page is now the only place an external link appears, alongside each source's full APA record, corroboration notes, and any conflict-of-interest disclosure — none of which a reader used to see if they never happened to visit References directly."
      - "Restyled markers as small and muted at rest, since the actual complaint was visual noise, not the citations themselves — every claim still keeps its marker."
      - "Added a highlighted-landing effect and adjusted spacing on the References page so following a marker actually lands you on the right entry, not just somewhere on a long page."
    human_did:
      - "Requested the policy change based on reader feedback."
    notes: >-
      Verified mechanically (build, link-checking, before/after counts)
      that no citation was dropped and no link was broken by this
      change — see the batch's own verification report for the exact
      numbers. This was a presentation/linking change only; no claims,
      sources, or citation text were rewritten.

  - date: "2026-07-23"
    summary: "Citation marker text, consolidation, and References naming"
    ai_did:
      - "Shortened every source marker site-wide from a full author list to just first-author surname + year (e.g. 'Brynjolfsson 2025'), in response to feedback that markers still felt visually heavy even after the previous batch's restyling. The full citation stays available on hover/for assistive tech, and author-date labels avoid depending on reference-list order the way a numbered system would."
      - "Consolidated the six Most Exposed Occupations items down to a single section-level source note, since every one of them cited the same two sources — removing repeated identical markers without losing traceability. Checked every other list section on the site the same way; none of the others qualified, since their items draw on genuinely different sources."
      - "Renamed the reader-facing 'Sources' label to 'References' everywhere a reader sees it (nav, footer, in-copy mentions) for APA 7 consistency — the page's URL and underlying code didn't change, just the name shown to readers."
    human_did:
      - "Requested this batch based on continued reader feedback on visual noise."
    notes: >-
      Verified mechanically that no citation id disappeared from the site,
      no link broke, and the sitewide marker count dropped by exactly the
      number removed by consolidation (10, matching the arithmetic in the
      batch's own report) — see that report for the full count-by-count
      breakdown. Two citations that would have produced the same short
      label (e.g. two separate undated Karpathy sources) were given
      matching a/b suffixes on their marker and their References entry.

  - date: "2026-07-23"
    summary: "Color re-skin: Gradient Blues palette"
    ai_did:
      - "Re-skinned the site's color tokens around a 'Gradient Blues' indigo-to-aqua ramp, in response to stakeholder feedback that the palette read as drab. The brand/link color and a new set of ramp tokens draw from this sequential palette; History and Take Action deliberately kept their warm rust/amber accents as counterpoints, so sections stay visually distinguishable rather than the whole site turning one shade of blue."
      - "Applied the ramp as the site's one gradient feature (the homepage era timeline's four-card border progression), raised color presence on the homepage hero stat, The Evidence/History/Take Action section headings, The Evidence's alternating bands, and Take Action's policy-debate cards, and fixed a pre-existing mismatch where each page's 'next' journey-pager card was colored with its own section's accent instead of the destination page's."
      - "Computed every contrast ratio and luminance value with a WCAG-formula script (validated against known reference pairs before use, then deleted) rather than estimating any of them, and darkened a couple of ramp-derived accent values just enough to clear the relevant text/UI contrast floor where the raw ramp color fell short."
    human_did:
      - "Requested the re-skin based on stakeholder feedback, and specified the palette, the constraint that section wayfinding colors stay distinct, and the accessibility floors to hold."
    notes: >-
      Verified mechanically (build, contrast/luminance tables, token
      grep) — see the batch's own report for the full before/after tables.
      No visual/browser verification was possible in this environment;
      QA-CHECKLIST.md was updated with the specific visual checks a human
      still needs to do.

  - date: "2026-07-23"
    summary: "Two new History banner images (telephone operators, office typists)"
    ai_did:
      - "Added a lead image to History's two remaining image-less cases (Automation of Telephone Operators, Computerization of Office Work), moving both supplied files into place and writing alt text after viewing each image directly."
      - "Extended the shared figure-credit template to support a plain-text image credit (no citation link) alongside the existing citeLink-based one, since neither new image fits the site's usual bibliographic-citation pattern: one is AI-generated with no source to credit, and the other is a copyrighted TV still credited under fair use rather than cited as a source."
    human_did:
      - "Supplied both image files and the exact fair-use attribution text for the Mad Men still; confirmed the AI-generated telephone-operator image needs no attribution."
    notes: >-
      The Mad Men still depicts a 1960s office, not the case's own
      1980s-2000s window — captioned as illustrating the kind of
      typing-pool clerical work computerization went on to replace,
      rather than presented as a period-exact photo, so the caption
      doesn't overstate what the image actually shows.
