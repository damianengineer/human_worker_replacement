# Global site strings — edit these to change text that appears on every
# page (site title, nav labels, footer). Page-specific copy belongs in that
# page's own content/*.md file instead.

title: "AI & Your Job"
# Retitled from "AI & Your First Job" (Homepage Edits v2) — "first job"
# read as excluding the career-changers/retraining students in the
# audience who already have work experience, just not in their new
# field. Same value as `title`: this title is actually shorter than the
# old one, not longer, so the anticipated need for a distinct short form
# (see the git history for this comment) never materialized — the header's
# narrow-width brand span still falls back to this field when set, it
# just happens to be identical to the full title right now.
short_title: "AI & Your Job"
tagline: "What AI means for entry-level work — and how to get ready"

# Nav entries are added here as each page is built (see CLAUDE.md Section 11:
# "When adding a new page, update: the nav partial..."). Only pages that
# exist should be listed, so we don't ship broken links. short_label is
# optional — only set where the full label is worth shortening at narrow
# widths; the header falls back to `label` when it's absent.
nav:
  - label: "The Evidence"
    short_label: "Evidence"
    url: "/the-evidence/"
  - label: "History"
    url: "/history/"
  - label: "Take Action"
    short_label: "Action"
    url: "/take-action/"
  - label: "Glossary"
    url: "/glossary/"
  - label: "References"
    short_label: "Refs"
    url: "/references/"
# Home is reachable via the header brand link (already links to "/").
# References is reachable above under its own label — same URL, not
# duplicated here under a second label. short_label ("Refs") is shorter
# than the old bare "Sources" label was, so renaming to the full APA-7
# "References" (Citation Marker Text batch, Task C) doesn't cost any width
# at narrow viewports — see that batch's report for the arithmetic.

# About and AI Disclosure are one click away via the "More" details-
# dropdown in tier 1 (site-chrome-top.njk), not flat nav items — adding
# them as two more full-width links was the part the width-budget
# arithmetic couldn't afford (five short-label items plus a shortened
# future brand already land at or past a 375px content budget); the
# dropdown trigger itself only costs about as much row-width as one
# more short word, not two full labels.
nav_more:
  - label: "About"
    url: "/about/"
  - label: "AI Disclosure"
    url: "/ai-disclosure/"

# Complete sitemap (Nav Redesign Task 4) — every page except Home appears
# in exactly one group; Home is reachable via the header brand link on
# every page, the same reasoning that already exempts it from primary
# nav above, so it's not duplicated here either.
footer:
  copyright: "This site is a student-focused educational resource."
  groups:
    - heading: "The argument"
      links:
        - label: "The Evidence"
          url: "/the-evidence/"
          note: "What the data shows right now"
        - label: "History"
          url: "/history/"
          note: "Four earlier moments to learn from"
        - label: "Take Action"
          url: "/take-action/"
          note: "Plan B, AI literacy, policy"
    - heading: "Reference"
      links:
        - label: "Glossary"
          url: "/glossary/"
          note: "Plain-language definitions"
        - label: "References"
          url: "/references/"
          note: "Every citation in full (APA)"
    - heading: "About this site"
      links:
        - label: "About"
          url: "/about/"
          note: "Who this is for and why"
        - label: "AI Disclosure"
          url: "/ai-disclosure/"
          note: "How this site was made"

# Guided prev/next order for the "journey pager" partial
# (src/_includes/partials/pager.njk), rendered at the end of <main> on any
# page whose url appears here. The last entry is a loop-back — a
# destination only, never itself a "current page" match (its url is an
# anchor on the same page as the first entry, so the first entry always
# matches before the loop-back ever could).
journey:
  - url: "/the-evidence/"
    label: "The Evidence"
    teaser: "What the data actually shows right now"
  - url: "/history/"
    label: "History"
    teaser: "This has happened before — four times we can study"
  - url: "/take-action/"
    label: "Take Action"
    teaser: "So what do you actually do about it?"
  - url: "/the-evidence/#stark-state"
    label: "Check your major"
    teaser: "Loop back: your Stark State program against the exposure data"
