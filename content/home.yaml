# Data for the landing page ("/"). Same pattern as history.yaml/evidence.yaml:
# a non-technical editor edits this file to change what the page says,
# without touching any template.
#
# Unlike the other content pages, this page's prose links out mid-sentence
# rather than in a trailing "Source:" line, so a few text fields below
# embed inline HTML anchors directly (the same technique citeLink already
# uses to return raw links) — rendered with the `safe` filter in
# home.njk. This keeps all prose in this data file, not the template.

# Rendered between the h1 and the markdown intro (index.md's `content`).
# The stat is the largest element on the page by design — the h1 stays
# the document's h1 for semantics, but home.css sizes it down to
# --font-size-2xl on this page so it reads as a masthead above the hero,
# not a competitor with it.
hero:
  stat: "13–16%"
  stat_label: >-
    decline in employment for young workers (22–25) in AI-exposed jobs
    since ChatGPT launched
  source_note: "Concentrated in entry-level hiring — not senior layoffs."
  citations: ["brynjolfsson2025", "massenkoff2026"]

short_version:
  heading: "The short version"
  # Trimmed to drop the stat sentence now that the hero states it above —
  # this is the caveat paragraph (plus the chart) that follows it, not a
  # restatement.
  text: >-
    That's the clearest single finding in the data — but it's far from
    the whole picture.
  citations: ["brynjolfsson2025", "massenkoff2026"]
  link_label: "Read the full evidence"
  link_url: "/the-evidence/"
  # Same chart already embedded on /the-evidence/#at-risk (reused file,
  # same alt text/title/citation — not a re-screenshot), added here as a
  # supporting visual per the multimedia-enhancements task. Uses the same
  # figure+lightbox macro as the-evidence.njk (src/_includes/partials/figures.njk).
  figure:
    id: "home-capability-chart"
    image: "/assets/img/theoretical-capability-vs-observed-exposure.webp"
    alt: >-
      Bar chart comparing each occupational category's theoretical AI
      capability to how much AI exposure has actually been observed
      in the workforce.
    title: "Theoretical capability and observed exposure by occupational category"
    citation: "massenkoff2026"

where_to_go:
  heading: "Two clocks, two moves"
  intro: >-
    The measured evidence is why you should act this semester. The
    speculative future is why you should pay attention this decade — policy
    moves slower than technology, so the debate that affects you most is the
    one happening now.
  groups:
    - heading: "Your move — this semester"
      items:
        - lead: "Worried your major is in an exposed field?"
          text: >-
            See which jobs and Stark State programs the data flags, then
            <a href="/take-action/#plan-b">build a Plan B</a>.
        - lead: "Wondering how to actually use AI instead of losing to it?"
          text: >-
            <a href="/take-action/#ai-literacy">Improve your AI literacy</a>
            with vetted, beginner-friendly resources.
    - heading: "Our move — this decade"
      items:
        - lead: "Want to have a say in how this gets handled?"
          text: >-
            <a href="/take-action/#policy-debate">Start with the debate</a>
            over <a href="/glossary/#universal-basic-income-ubi">UBI</a> and
            <a href="/glossary/#sovereign-wealth-fund">sovereign wealth funds</a>,
            then <a href="/take-action/#policy">track the actual bills</a>.

timeline:
  heading: "Where this story is"
  intro: >-
    One way to hold this whole site in your head: four moments on one
    timeline, from settled history to open speculation. The further right you
    look, the less anyone actually knows — and that's exactly why the two
    kinds of action below run on two different clocks.
  eras:
    - label: "The past"
      certainty: "Documented"
      text: >-
        In 1813, seventeen men were hanged for breaking the machines that took
        their jobs. By 2025, Amazon ran roughly a million warehouse robots.
        Technology reshaping who gets hired isn't new — we have four earlier
        cases to learn from.
      link_label: "Read the history"
      link_url: "/history/"
      # Same file, alt text, title, and citation as /history/'s own
      # Luddite figure — not a re-screenshot, just reused (History's own
      # licensing diligence covers this image; see content/history.yaml).
      image: "/assets/img/luddite-leader-1812-engraving.jpg"
      image_width: 909
      image_height: 1200
      image_alt: >-
        Hand-colored 1812 engraving titled "The Leader of the Luddites,"
        showing a costumed figure holding a staff and gesturing toward a
        crowd of armed protesters near a burning mill in the background.
      image_credit: "The Leader of the Luddites (1812)"
      image_citation: "luddite1812engraving"
    - label: "Right now"
      certainty: "Measured"
      text: >-
        Since ChatGPT launched, employment for young workers in AI-exposed
        jobs has fallen about 13–16% — concentrated in entry-level hiring.
        Not mass layoffs: a door quietly closing.
      link_label: "See the evidence"
      link_url: "/the-evidence/"
      # Same file/credit as /history/'s Amazon Warehouse Robotics figure.
      image: "/assets/img/amazon-fulfillment-center-drive-robot.jpg"
      image_width: 1200
      image_height: 900
      image_alt: >-
        Photo of a round, blue-and-black Amazon Robotics warehouse
        drive-unit robot labeled "2021," displayed on a table.
      image_credit: "An Amazon Robotics drive-unit robot"
      image_citation: "amazonroboticsphoto2025"
    - label: "Near future"
      certainty: "Forecast — contested"
      text: >-
        AGI — AI that matches capable humans at most mental work — doesn't
        exist, and experts disagree on when or whether it will. But it's what
        the major labs say they're building, so it belongs in your planning
        as a possibility, not a promise.
      link_label: "What AGI actually means"
      link_url: "/glossary/#artificial-general-intelligence-agi"
    - label: "Open future"
      certainty: "Speculative"
      text: >-
        If machines ever do most of the work, who gets paid? That question —
        not science fiction — is what's behind the UBI and sovereign wealth
        fund proposals in Congress right now.
      link_label: "Understand the policy debate"
      link_url: "/take-action/#policy-debate"

closing:
  text: >-
    Every claim on this site links to a real source, and we say plainly
    when a source comes from a company with a stake in the answer, like
    an AI lab, versus independent research. See
    <a href="/ai-disclosure/">how we handle sources</a> and the
    <a href="/references/">full reference list</a>.
