# Structured citation data (CLAUDE.md Section 6). Every factual/statistical
# claim in content/*.md must cite an entry here by ID. Prose can reference
# a citation with the `{% cite "id" %}` shortcode; the glossary references
# entries directly by id in its `origin`/`current` fields. Either way, the
# same entry also drives the auto-generated references page (content/references.md)
# — do not hand-format citations in a second place, that causes drift.
#
# Schema for each entry:
#
# citation_id:
#   authors: "Author Name(s) or Organization"
#   year: 2024                      # or a string like "1955/2006" for reprints
#   date: "2024-03-05"              # optional — only when a full publication
#     date (not just year) is known and needed, e.g. for an image/chart
#     credit line. Most entries only need `year`.
#   title: "Title of the work"
#   publisher: "Publisher, journal + volume/pages, or venue"
#   url: "https://example.com/..."  # omit/null if none is verified yet
#   type: "article" | "book" | "report" | "conference paper" | "news article" |
#         "primary source" | "government data" | "website"
#   potential_conflict: "None disclosed"  # or a description of the COI
#   status: "TODO(citation-needed)"  # only on entries with no usable citation
#     yet — named in copy but a full citation wasn't supplied. Renders as
#     "source needed", never a link. Do not invent the missing fields; ask
#     the user for them instead.
#   status: "unverified"  # only on entries with a real citation that still
#     needs double-checking (e.g. the user themselves flagged the exact date
#     or byline as uncertain). Renders with the citation shown but marked
#     "unverified" — distinct from TODO, which has no usable citation at all.
#   todo: "what's missing/uncertain and where it's used"  # on TODO or
#     unverified entries — the specific thing to confirm.
#   note: "editorial context"  # optional, on any entry — not an action item
#     (contrast with `todo`), just useful guidance, e.g. which of several
#     sources for the same claim is the primary one to cite.

# --- Complete entries (full bibliographic data supplied) ---

