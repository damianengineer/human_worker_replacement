# Data for the Take Action page. Same pattern as the other content/*.yaml
# files: a non-technical editor edits this file to change what the page
# says, without touching any template.
#
# This page has THREE calls to action, not one — CLAUDE.md Section 5's
# "one primary CTA per page" rule is written for content pages; this page
# is itself the site's documented CTA hub ("Take Action — primary CTAs:
# resources, checklists, links"), so three sits here by design.
#
# Each item:
#   text: the bullet's content
#   citations: list of citation IDs from content/citations.yaml (external
#     sources/resources) — rendered via citeLink, empty list if none
#   links: list of {label, url} for INTERNAL site cross-links (glossary,
#     The Evidence page, etc.) — these aren't "sources" needing APA
#     treatment, just navigation, so they render as plain links
#   advanced: true only on the one item flagged as a level-up/bonus
#     resource rather than a starting point

ctas:
  - key: "plan_b"
    heading: "Call to Action: If Your Major Is at High Risk, Build a Plan B"
    items:
      - text: >-
          Check your major against the exposure data first. Use the
          Anthropic/OpenAI occupation tables and the Stark State tier
          list we built earlier — if your program falls in Tier 1
          (highest-confidence exposure match), don't panic, but do take
          the next steps seriously.
        citations: []
        links:
          - label: "See the exposure data and Stark State tier list"
            url: "/the-evidence/#stark-state"
      - text: >-
          A minor doesn't have to mean starting over. The goal is a
          credential that pairs with what you're already studying, not a
          second full degree. A Computer Programming major, for example,
          pairs naturally with a Cybersecurity or Health Information
          Management credential — both draw on overlapping skills but sit
          in a different exposure tier.
        citations: []
        links: []
      - text: >-
          Favor credentials with licensure or hands-on requirements.
          Programs like Dental Hygiene, HVACR, Electrical Maintenance, or
          Physical/Occupational Therapy Assistant carry the same
          protective factors (physical necessity, licensing requirements)
          that showed up throughout our research as durable barriers to
          automation.
        citations: []
        links:
          - label: "See why these barriers matter"
            url: "/the-evidence/#protective-factors"
      - text: >-
          Stack, don't replace. Many community college certificates (like
          Medical Coding, Bookkeeping, or a CDL) can be added on top of
          your current major in one or two semesters — a much lower-cost
          hedge than switching majors outright.
        citations: []
        links: []
      - text: >-
          Talk to your academic advisor about a "minor" or "certificate"
          pathway specifically, not just a second major — advisors can
          often identify stackable credentials that share credits with
          your current coursework, cutting the time and cost of a Plan B
          significantly.
        citations: []
        links: []
      - text: >-
          Reframe the goal: don't abandon your interest, adapt your
          specialization within it. If you love business but
          Administrative Office Professional work is exposed, consider
          whether a pivot toward Business Management or Marketing & Sales
          Management (categories with more mixed, demand-driven outlooks)
          keeps your interest intact while reducing risk.
        citations: []
        links: []
      - text: >-
          Revisit this plan every year or two. The exposure data itself
          is a moving target — a field considered safe today could look
          different in two years, and vice versa. Build in a habit of
          checking back rather than treating any plan as final.
        citations: []
        links: []

  - key: "ai_literacy"
    heading: "Call to Action: Improve Your AI Literacy"
    items:
      - text: >-
          Start with free, structured courses — Andrew Ng's beginner
          courses (via Coursera/DeepLearning.AI) are a trusted, low-cost
          way to actually understand how AI works, not just how to use
          it.
        citations: ["deeplearningai"]
        links: []
      - text: >-
          Watch conference talks for free — no ticket required. The AI
          Engineer World's Fair is the largest technical AI conference in
          the world, and every major talk is posted free on the AI
          Engineer YouTube channel — a way to hear directly from people
          building at OpenAI, Anthropic, and Google DeepMind without
          paying a cent.
        citations: ["aiengineerconf"]
        links: []
      - text: >-
          Join a beginner-friendly community. Learn AI Together (a
          Discord community run by Towards AI) is built specifically for
          people learning AI from scratch — a good first stop before
          anything more advanced.
        citations: ["learnaitogether"]
        links: []
      - text: >-
          🚀 Advanced Mode: Cerebral Valley — once you're ready to go
          further, Cerebral Valley is one of the most respected AI
          communities in the world, backed by Anthropic, Meta, and top
          venture firms, running hackathons with real prize money and
          direct access to people building frontier AI. It's aimed at
          experienced builders and founders, so it's best treated as a
          level-up goal, not a starting point — but it's genuinely one of
          the highest-value resources on this list once you're ready for
          it.
        citations: ["cerebralvalley"]
        links: []
        advanced: true
      - text: >-
          Learn to build without writing code. Tools like Zapier let you
          connect apps and plug in AI models like Claude or ChatGPT with
          zero programming — a great first project. Make.com is a good
          next step once you outgrow Zapier's simplicity, and n8n is
          worth exploring specifically if you're in a computer science or
          programming program.
        citations: ["zapier", "makecom", "n8n"]
        links: []
      - text: >-
          Understand what MCP is. The Model Context Protocol is how AI
          assistants like Claude connect to real tools and data — worth a
          basic understanding since it's becoming the standard way AI
          gets "hands" to do real work.
        citations: ["mcp"]
        links: []
      - text: >-
          Learn the privacy basics before you rely on AI daily.
          Understand what happens to information you type into a
          chatbot, and check whether your school or future employer has
          AI usage policies — treat this the same way you'd treat any
          other digital privacy habit.
        citations: []
        links: []
      - text: >-
          Go deeper when you're ready. For a technical (but excellent)
          look at how AI models actually store information, 3Blue1Brown's
          "How might LLMs store facts" video is one of the best
          plain-but-rigorous explainers available — a good "next step"
          once the basics feel comfortable.
        citations: ["threeblue1brown"]
        links: []
      - text: >-
          Don't fear it — use it as a force multiplier. The goal of every
          resource on this list isn't to turn you into a programmer. It's
          to make you someone who directs AI tools confidently, instead
          of someone AI tools replace.
        citations: []
        links: []

  - key: "policy"
    heading: "Call to Action: Be an Informed Citizen on AI Policy"
    items:
      - text: >-
          Track real bills yourself — don't rely on headlines.
          Congress.gov is the official, nonpartisan source for bill text
          and status. As of this research, Senator Bernie Sanders'
          American AI Sovereign Wealth Fund Act (S.4825) has been
          introduced and referred to the Senate Finance Committee, with
          zero cosponsors so far — a good example of how far a proposal
          is from becoming law, versus how it's often covered in the
          news.
        citations: ["sanders2026"]
        links: []
      - text: >-
          Know there's more than one proposal on the table. A related
          bill, the American Sovereign Wealth Fund Exploration Act (H.R.
          3116), has separately been introduced in the House by Rep.
          Morgan McGarvey — worth knowing that this isn't a single-party
          or single-bill issue.
        citations: ["mcgarvey2026"]
        links: []
      - text: >-
          Understand what's actually being proposed before forming an
          opinion. Read the plain differences between a Universal Basic
          Income (regular cash payments to everyone) and a Sovereign
          Wealth Fund (government-owned investment fund that pays
          dividends, like Alaska's oil fund) — these solve different
          problems and have different trade-offs, which we covered
          earlier in this project.
        citations: []
        links:
          - label: "Universal Basic Income (glossary)"
            url: "/glossary/#universal-basic-income-ubi"
          - label: "Sovereign Wealth Fund (glossary)"
            url: "/glossary/#sovereign-wealth-fund"
      - text: >-
          Connect the policy debate to something concrete: Social
          Security. The Social Security Trust Fund is projected to run
          short of money around 2033. The Social Security
          Administration's own actuaries have warned that
          faster-than-expected AI-driven job losses could shrink the
          payroll taxes that fund it and make that shortfall arrive
          sooner — a real, non-speculative reason this issue affects your
          own retirement, not just an abstract future.
        citations: ["ssatrustees"]
        links: []
      - text: >-
          Read multiple sources before deciding what you think. Go back
          to the evenhanded evidence we gathered earlier — the strongest
          research (like the Stanford "Canaries" study) shows real but
          limited effects so far, while skeptical, credible economists
          (like the Brookings review) argue it's too early to know for
          sure. Good citizenship on this topic means holding both of
          those facts at once, not picking the version that confirms what
          you already believed.
        citations: ["brynjolfsson2025", "kolko2026"]
        links:
          - label: "Revisit the full evidence and counterarguments"
            url: "/the-evidence/"
      - text: >-
          Show up to where decisions actually get made. Look for local
          town halls, university panels, or state legislative hearings on
          AI and labor policy — these are often less partisan and more
          substantive than national media coverage.
        citations: []
        links: []
      - text: >-
          Vote with the long-term stakes in mind, not just today's
          headlines. Whatever you think about specific proposals like a
          sovereign wealth fund or UBI, the underlying question — how
          should the gains from AI be shared, and how do we fund
          retirement if fewer people are working traditional jobs — will
          still matter for your entire working life, long after any
          single election cycle.
        citations: []
        links: []
