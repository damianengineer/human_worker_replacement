# Data for the Take Action page. Same pattern as the other content/*.yaml
# files: a non-technical editor edits this file to change what the page
# says, without touching any template.
#
# This page has THREE calls to action, not one — CLAUDE.md Section 5's
# "one primary CTA per page" rule is written for content pages; this page
# is itself the site's documented CTA hub ("Take Action — primary CTAs:
# resources, checklists, links"), so three sits here by design.
#
# Each item:
#   text: the bullet's content
#   citations: list of citation IDs from content/citations.yaml (external
#     sources/resources) — rendered via citeLink, empty list if none
#   links: list of {label, url} for INTERNAL site cross-links (glossary,
#     The Evidence page, etc.) — these aren't "sources" needing APA
#     treatment, just navigation, so they render as plain links
#   advanced: true only on the one item flagged as a level-up/bonus
#     resource rather than a starting point

# Topic hub (Take Action v2, Task 1) — a compact wayfinding summary
# rendered above the three CTAs, one card per CTA. Not a replacement for
# the sections below it: one topic, one plain-language line, one jump
# link per card. `icon` duplicates that CTA's own emoji (see `ctas` below)
# rather than the template cross-referencing it, since Nunjucks has no
# reliable built-in way to look up a matching entry in another list —
# keep the two in sync if either ever changes.
hub:
  lead: "Choose a topic below to get started."
  cards:
    - key: "plan_b"
      icon: "🛟"
      title: "Build a Plan B"
      blurb: "Check your major against the data, then stack a certificate or skill that AI is unlikely to replace."
      href: "#plan-b-heading"
      cta_label: "Explore"
    - key: "ai_literacy"
      icon: "🧠"
      title: "Improve Your AI Literacy"
      blurb: "Free courses, videos, podcasts, and communities that make you the person directing AI tools."
      href: "#ai-literacy-heading"
      cta_label: "Explore"
    - key: "policy"
      icon: "🏛️"
      title: "Be an Informed Citizen"
      blurb: "Understand the UBI and sovereign wealth fund debate, then track the bills that affect you."
      href: "#policy-heading"
      cta_label: "Explore"

ctas:
  - key: "plan_b"
    icon: "🛟"
    heading: "Call to Action: If Your Major Is at High Risk, Build a Plan B"
    items:
      - summary: "Check your major against the exposure data first."
        text: >-
          Check your major against the exposure data first. Use the
          Anthropic/OpenAI occupation tables and the Stark State tier
          list we built earlier — if your program falls in Tier 1
          (highest-confidence exposure match), don't panic, but do take
          the next steps seriously.
        citations: []
        links:
          - label: "See the exposure data and Stark State tier list"
            url: "/the-evidence/#stark-state"
      - summary: "Pair a credential with your current major instead of starting over."
        text: >-
          A minor doesn't have to mean starting over. The goal is a
          credential that pairs with what you're already studying, not a
          second full degree. A Computer Programming major, for example,
          pairs naturally with a Cybersecurity or Health Information
          Management credential — both draw on overlapping skills but sit
          in a different exposure tier.
        citations: []
        links: []
      - text: >-
          Favor credentials with licensure or hands-on requirements.
          Programs like Dental Hygiene, HVACR, Electrical Maintenance, or
          Physical/Occupational Therapy Assistant carry the same
          protective factors (physical necessity, licensing requirements)
          that showed up throughout our research as durable barriers to
          <a href="/glossary/#automation-of-work">automation</a>.
        citations: []
        links:
          - label: "See why these barriers matter"
            url: "/the-evidence/#protective-factors"
      - text: >-
          Stack, don't replace. Many community college certificates (like
          Medical Coding, Bookkeeping, or a CDL) can be added on top of
          your current major in one or two semesters — a much lower-cost
          hedge than switching majors outright.
        citations: []
        links: []
      - summary: "Talk to your advisor about a minor or certificate pathway."
        text: >-
          Talk to your academic advisor about a "minor" or "certificate"
          pathway specifically, not just a second major — advisors can
          often identify stackable credentials that share credits with
          your current coursework, cutting the time and cost of a Plan B
          significantly.
        citations: []
        links: []
      - summary: "Adapt your specialization within your interest, don't abandon it."
        text: >-
          Reframe the goal: don't abandon your interest, adapt your
          specialization within it. If you love business but
          Administrative Office Professional work is exposed, consider
          whether a pivot toward Business Management or Marketing & Sales
          Management (categories with more mixed, demand-driven outlooks)
          keeps your interest intact while reducing risk.
        citations: []
        links: []
      - summary: "Revisit this plan every year or two."
        text: >-
          Revisit this plan every year or two. The exposure data itself
          is a moving target — a field considered safe today could look
          different in two years, and vice versa. Build in a habit of
          checking back rather than treating any plan as final.
        citations: []
        links: []

  - key: "ai_literacy"
    icon: "🧠"
    heading: "Call to Action: Improve Your AI Literacy"
    # This CTA is grouped by resource type (in-person events > self-paced
    # online learning > videos > podcasts > reading > online communities),
    # unlike plan_b/policy which use a flat `items` list — see the
    # template's resource_groups branch. The "force multiplier" framing
    # isn't tied to a specific resource, so it sits in intro_items instead
    # of a type group, rendered before "In-Person Events."
    intro_items:
      - text: >-
          Don't fear it — use it as a force multiplier. The goal of every
          resource on this list isn't to turn you into a programmer. It's
          to make you someone who directs AI tools confidently, instead of
          someone AI tools replace.
        citations: []
        links: []
    resource_groups:
      - type: "In-Person Events"
        items:
          - text: >-
              🚀 Advanced Mode: Cerebral Valley — once you're ready to go
              further, Cerebral Valley is one of the most respected AI
              communities in the world, backed by Anthropic, Meta, and top
              venture firms, running hackathons with real prize money and
              direct access to people building frontier AI. It's aimed at
              experienced builders and founders, so it's best treated as a
              level-up goal, not a starting point — but it's genuinely one
              of the highest-value resources on this list once you're
              ready for it.
            citations: ["cerebralvalley"]
            links: []
            advanced: true

      - type: "Self-Paced Online Learning"
        items:
          - text: >-
              Start with free, structured courses — Andrew Ng's beginner
              courses (via Coursera/DeepLearning.AI) are a trusted,
              low-cost way to actually understand how AI works, not just
              how to use it.
            citations: ["deeplearningai"]
            links:
              - label: "Machine Learning Specialization (Coursera)"
                url: "https://www.coursera.org/specializations/machine-learning-introduction"
          - text: >-
              Fast.ai (Jeremy Howard) takes the opposite approach from
              DeepLearning.AI: instead of building up theory first, it
              gets you training real, state-of-the-art models in the
              first lesson, introducing the underlying math progressively
              as you actually need it. Worth trying if a bottom-up course
              isn't clicking for you.
            citations: ["fastai"]
            links: []
          - text: >-
              Learn to build without writing code. Tools like Zapier let
              you connect apps and plug in AI models like Claude or
              ChatGPT with zero programming — a great first project.
              Make.com is a good next step once you outgrow Zapier's
              simplicity, and n8n is worth exploring specifically if
              you're in a computer science or programming program.
            citations: ["zapier", "makecom", "n8n"]
            links: []

      - type: "Videos"
        items:
          - text: >-
              Watch conference talks for free — no ticket required. The AI
              Engineer World's Fair is one of the highest-profile technical
              AI conferences, and every major talk is posted free on the AI
              Engineer YouTube channel — a way to hear directly from
              people building at OpenAI, Anthropic, and Google DeepMind
              without paying a cent.
            # Final Batch, Task 1b/1c — citations was empty even though
            # aiengineerconf in citations.yaml was defined specifically for
            # this item (its own note says so); restored the missing
            # marker. Also reworded "the largest technical AI conference in
            # the world" (unverifiable superlative, and not what the
            # source itself claims) to "one of the highest-profile technical
            # AI conferences" — matching the site's own "most successful
            # AI Engineer event of all time" / "highest-signal" framing.
            citations: ["aiengineerconf"]
            links:
              - label: "Conference site (ai.engineer)"
                url: "https://www.ai.engineer/"
              - label: "YouTube channel (free talks)"
                url: "https://www.youtube.com/@aiDotEngineer"
              - label: "Representative talk (WF2026 keynotes ft. Anthropic, Google DeepMind, Amazon AGI)"
                url: "https://www.youtube.com/watch?v=4sX_He5c4sI"
                embed_video_id: "4sX_He5c4sI"
          - text: >-
              Andrej Karpathy's "Neural Networks: Zero to Hero" is widely
              considered one of the best AI courses ever made, free or
              paid — a code-along series that starts at basic
              backpropagation and ends with you building a working
              GPT-style model from scratch.
            citations: ["karpathyzerotohero"]
            links:
              - label: "YouTube playlist"
                url: "https://www.youtube.com/playlist?list=PLXYLzZ3XzIbi4lL43O6fIU_ojuZwBO6vi"
              - label: "Start here: building micrograd (Lecture 1)"
                url: "https://www.youtube.com/watch?v=44_j7ufypfw"
                image: "/assets/img/youtube-thumb-karpathy-lecture1.jpg"
          - text: >-
              3Blue1Brown's Neural Networks series is one of the most
              acclaimed visual explanations of how neural networks work
              ever made — start there if the fundamentals still feel
              shaky. Once you're comfortable, his "How might LLMs store
              facts" video is a genuinely excellent, if technical, look at
              how a fact as specific as "Michael Jordan plays basketball"
              might get stored inside a model.
            citations: ["threeblue1brown"]
            links:
              - label: "Neural Networks series (start here)"
                url: "https://www.youtube.com/playlist?list=PLZZWrBYkx7Otcjr3eCLZDCgfpqnxMY29s"
                image: "/assets/img/youtube-thumb-3b1b-neural-networks-ch1.jpg"
              - label: "How might LLMs store facts"
                url: "https://www.youtube.com/watch?v=9-Jl0dxWQs8"
                embed_video_id: "9-Jl0dxWQs8"

      - type: "Podcasts"
        items:
          - text: >-
              Latent Space — hosted by and for AI engineers — is one of
              the most technically substantive AI podcasts around,
              covering the modern AI engineering stack: code-gen tools,
              agents, GPU infrastructure, and interviews with the people
              building all of it.
            citations: ["latentspacepodcast"]
            links:
              - label: "YouTube channel"
                url: "https://www.youtube.com/channel/UCxBcwypKK-W3GHd_RZ9FZrQ"

      - type: "Reading"
        items:
          - text: >-
              Subscribe to the Latent Space newsletter — written by
              practitioners covering frontier AI engineering, it's a good
              way to keep up once you've got the basics down.
            citations: ["latentspace"]
            links: []
          - text: >-
              Skim this site's References page. Every source cited across
              this site is listed there, so you can go straight to the
              original studies and reports instead of relying on our
              summary of them.
            citations: []
            links:
              - label: "References"
                url: "/references/"
          - text: >-
              Start with this site's Glossary if the terminology in any
              of this is new — it's the fastest way to get comfortable
              with the basic vocabulary before going further.
            citations: []
            links:
              - label: "Glossary"
                url: "/glossary/"
          - text: >-
              For quick daily reads that build vocabulary fast, The
              Rundown AI and TLDR AI both give five-minute, jargon-free
              summaries of what happened in AI that day — a good habit to
              build early.
            citations: ["therundownai", "tldrai"]
            links: []
          - text: >-
              Ethan Mollick's "One Useful Thing" is one of the best
              resources for understanding what AI can practically do for
              non-experts — he skips the code entirely and focuses on how
              everyday people and junior employees can use frontier
              models to solve real problems.
            citations: ["oneusefulthing"]
            links: []
          - text: >-
              Sebastian Raschka's "Ahead of AI" newsletter is a clear,
              well-illustrated bridge between beginner and expert — strong
              on how models actually work under the hood (fine-tuning,
              quantization, architecture) without needing a research
              background.
            citations: ["aheadofai"]
            links: []
          - text: >-
              Stanford HAI (the Human-Centered AI Institute, co-founded by
              Fei-Fei Li) publishes accessible research and policy
              analysis on AI's benchmarks and societal impact — a good
              source for the ethical and policy side of AI, not just the
              engineering side.
            citations: ["stanfordhai"]
            links: []
          - text: >-
              The NVIDIA Technical Blog is the closest thing to a primary
              source on GPU infrastructure and large-scale model
              deployment — useful once you want to understand the
              hardware and infrastructure side of AI, not just the models
              themselves.
            citations: ["nvidiadevblog"]
            links: []
          - text: >-
              The Batch, Andrew Ng's weekly newsletter from
              DeepLearning.AI, is a reliably hype-free synthesis of where
              AI research actually intersects with real engineering and
              business use — including a personal letter from Ng in every
              issue.
            citations: ["thebatch"]
            links: []
          - text: >-
              If you want to go straight to the research, arXiv Sanity
              Lite (built by Andrej Karpathy) filters and ranks the flood
              of new AI papers on arXiv by community signal, so you're
              not searching blind.
            citations: ["arxivsanity"]
            links: []
          - text: >-
              Understand what MCP is. The Model Context Protocol is how AI
              assistants like Claude connect to real tools and data —
              worth a basic understanding since it's becoming the standard
              way AI gets "hands" to do real work.
            citations: ["mcp"]
            links: []
          - text: >-
              Learn the privacy basics before you rely on AI daily.
              Understand what happens to information you type into a
              chatbot, and check whether your school or future employer
              has AI usage policies — treat this the same way you'd treat
              any other digital privacy habit.
            citations: []
            links: []

      - type: "Online Communities"
        items:
          - text: >-
              Joining the community around whatever you're already using
              is often the fastest way to get real help when you're
              stuck. Many of the resources above — courses, conferences,
              and tools alike — also run their own Discord or Slack
              communities once you look for them.
            citations: []
            links: []
          - text: >-
              Join a beginner-friendly community. Learn AI Together (a
              Discord community run by Towards AI) is built specifically
              for people learning AI from scratch — a good first stop
              before anything more advanced.
            citations: ["learnaitogether"]
            links: []

    # A distinct, visually-flagged subsection (not a resource_group, since
    # it's a warning/topic, not a media type) — rendered last, styled to
    # stand out from the resource lists above it.
    caution_section:
      heading: "AI Privacy and Security"
      intro:
        - >-
          AI tools don't just add new privacy and security risks — they
          often make your existing ones bigger. Every habit you already
          should have around passwords, personal information, and
          sensitive data applies to AI too, and then some: what you type
          into a chatbot can be logged, stored, used to improve a
          company's models, or exposed if that company gets breached.
        - >-
          Be especially careful before you paste personal information,
          passwords, financial details, health information, or
          confidential work material into an AI tool — or connect an AI
          tool to a system that handles money, medical records, or other
          sensitive functions. If you wouldn't hand it to a stranger,
          don't hand it to an AI tool without knowing exactly where that
          information goes.
      items:
        - text: >-
            Learn how AI systems actually get attacked, hands-on. Prompt
            injection — tricking an AI into ignoring its instructions or
            revealing things it shouldn't — is one of the most common ways
            AI tools get exploited. This curated list of free, hands-on
            practice challenges (including Gandalf, Prompt Airlines, and
            PortSwigger's LLM Attacks Lab) lets you see it happen
            yourself, safely.
          citations: ["aisecurityreferences"]
          links: []
        - text: >-
            Know the frameworks security researchers actually use. MITRE
            ATLAS catalogs real-world attacks against AI systems, and the
            OWASP Top 10 for LLM Applications lists the most common ways
            AI tools get exploited in practice — both are free, and both
            are built for exactly this kind of self-education.
          citations: ["mitreatlas", "owasptop10llm"]
          links: []
        - text: >-
            Know the legal line, not just the technical one. The EU AI
            Act bans some AI uses outright, including AI that manipulates
            people in ways that cause real harm and mass, untargeted
            scraping of faces to build facial recognition databases. Even
            outside the EU, it's a useful signal for what regulators
            consider not just risky, but flatly unacceptable.
          citations: ["euaiact"]
          links:
            - label: "Plain-language summary (EU AI Act Service Desk)"
              url: "https://ai-act-service-desk.ec.europa.eu/en/ai-act/article-5"

  - key: "policy"
    icon: "🏛️"
    heading: "Call to Action: Be an Informed Citizen on AI Policy"
    # Renders above the bill-tracking items below via take-action.njk's
    # `{% if cta.debate %}` block — additive, doesn't touch the flat
    # `items` list's own rendering path.
    debate:
      heading: "First, understand the debate"
      intro: >-
        Before tracking any bill, it helps to understand the two big proposals for
        sharing AI's gains — and the honest case against each. These aren't fringe
        ideas or settled plans: they're insurance policies being debated now for a
        future nobody can yet measure.
      proposals:
        - name: "Universal Basic Income (UBI)"
          what: >-
            Regular, unconditional cash payments to everyone, employed or not — an
            income floor under every person.
          case_for: >-
            If AI displaces workers faster than new jobs appear, systems tied to
            having a job — wages, employer benefits, payroll-tax-funded programs
            like Social Security — start to fail people through no fault of their
            own. A guaranteed floor catches everyone, automatically, without
            deciding who "deserves" help. The idea is older than the microchip:
            Thomas Paine proposed a version in 1797, and modern trials have tested
            it in the real world.
          case_against: >-
            It's expensive at national scale, and the trial evidence is genuinely
            mixed on how it changes work and wellbeing. And the strongest
            objection comes from our own Evidence page: skeptical economists argue
            the data doesn't yet show displacement at anywhere near the scale that
            would make UBI necessary — and history shows new kinds of jobs tend to
            appear when old ones change.
          citations: ["paine1797", "vanparijsvanderborght2017", "vivalt2024"]
          counter_citations: ["kolko2026", "autorchin2024"]
        - name: "Sovereign Wealth Fund"
          what: >-
            A government-owned investment fund whose profits pay dividends to the
            public — shared ownership of the gains, not just a payment.
          case_for: >-
            If AI concentrates enormous profits in the companies that own it, a
            public fund gives everyone a stake in those gains instead of a check
            funded by taxes. It's not hypothetical: Alaska has paid residents a
            yearly dividend from oil wealth for decades, and dozens of countries
            run such funds under agreed international principles. That's the model
            behind the sovereign-wealth-fund bills now in Congress.
          case_against: >-
            Where does the fund's money come from — and does the government
            picking investments create its own problems? Alaska's fund taps a
            physical resource the state already owned; AI profits belong to
            private companies. And the same skeptical evidence applies: if
            displacement stays modest, a massive new fund solves a problem we may
            not have.
          citations: ["rozanov2005", "iwgswf2008", "sanders2026"]
          counter_citations: ["kolko2026"]
      landing: >-
        This site doesn't endorse either proposal. Our argument is simpler: these
        debates are happening now, while you're in school — and you will live with
        the outcome longer than almost anyone currently voting on it. Whatever you
        conclude, conclude it from the evidence. That's what the steps below are
        for.
    items:
      - summary: "Track real bills yourself — don't rely on headlines."
        text: >-
          Track real bills yourself — don't rely on headlines.
          Congress.gov is the official, nonpartisan source for bill text
          and status. As of this research, Senator Bernie Sanders'
          American AI Sovereign Wealth Fund Act (S.4825) has been
          introduced and referred to the Senate Finance Committee, with
          zero cosponsors so far — a good example of how far a proposal
          is from becoming law, versus how it's often covered in the
          news.
        citations: ["sanders2026"]
        links: []
      - summary: "Know there's more than one proposal on the table."
        text: >-
          Know there's more than one proposal on the table. A related
          bill, the American Sovereign Wealth Fund Exploration Act (H.R.
          3116), has separately been introduced in the House by Rep.
          Morgan McGarvey — worth knowing that this isn't a single-party
          or single-bill issue.
        citations: ["mcgarvey2026"]
        links: []
      - summary: "Understand what's actually being proposed before forming an opinion."
        text: >-
          Understand what's actually being proposed before forming an
          opinion. Read the plain differences between a Universal Basic
          Income (regular cash payments to everyone) and a Sovereign
          Wealth Fund (government-owned investment fund that pays
          dividends, like Alaska's oil fund) — these solve different
          problems and have different trade-offs, which we covered
          earlier in this project.
        citations: []
        links:
          - label: "Universal Basic Income (glossary)"
            url: "/glossary/#universal-basic-income-ubi"
          - label: "Sovereign Wealth Fund (glossary)"
            url: "/glossary/#sovereign-wealth-fund"
      - summary: "Connect the policy debate to something concrete: Social Security."
        text: >-
          Connect the policy debate to something concrete: Social
          Security. The Social Security Trust Fund is projected to run
          short of money around 2034, according to the latest official
          Trustees Report — a real, non-speculative reason this issue
          affects your own retirement, not just an abstract future.
        citations: ["ssatrustees"]
        links: []
      - summary: "Read multiple sources before deciding what you think."
        text: >-
          Read multiple sources before deciding what you think. Go back
          to the evenhanded evidence we gathered earlier — the strongest
          research (like the Stanford "Canaries" study) shows real but
          limited effects so far, while skeptical, credible economists
          (like the Brookings review) argue it's too early to know for
          sure. Good citizenship on this topic means holding both of
          those facts at once, not picking the version that confirms what
          you already believed.
        citations: ["brynjolfsson2025", "kolko2026"]
        links:
          - label: "Revisit the full evidence and counterarguments"
            url: "/the-evidence/"
      - text: >-
          Show up to where decisions actually get made. Look for local
          town halls, university panels, or state legislative hearings on
          AI and labor policy — these are often less partisan and more
          substantive than national media coverage.
        citations: []
        links: []
      - summary: "Vote with the long-term stakes in mind, not just today's headlines."
        text: >-
          Vote with the long-term stakes in mind, not just today's
          headlines. Whatever you think about specific proposals like a
          sovereign wealth fund or UBI, the underlying question — how
          should the gains from AI be shared, and how do we fund
          retirement if fewer people are working traditional jobs — will
          still matter for your entire working life, long after any
          single election cycle.
        citations: []
        links: []
